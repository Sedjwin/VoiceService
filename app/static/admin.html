<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceService — Admin</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Crect x='4' y='12' width='3' height='8' rx='1.5' fill='%2322d3ee'/%3E%3Crect x='9' y='8' width='3' height='16' rx='1.5' fill='%2322d3ee'/%3E%3Crect x='14' y='4' width='3' height='24' rx='1.5' fill='%2322d3ee'/%3E%3Crect x='19' y='8' width='3' height='16' rx='1.5' fill='%2322d3ee' opacity='.8'/%3E%3Crect x='24' y='12' width='3' height='8' rx='1.5' fill='%2322d3ee' opacity='.6'/%3E%3C/svg%3E" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #030712;
    --card:     #111827;
    --card2:    #1f2937;
    --border:   #374151;
    --border2:  #4b5563;
    --text:     #f9fafb;
    --muted:    #9ca3af;
    --dim:      #6b7280;
    --amber:    #f59e0b;
    --amber2:   #fbbf24;
    --cyan:     #22d3ee;
    --blue:     #3b82f6;
    --purple:   #8b5cf6;
    --red:      #ef4444;
    --green:    #22c55e;
    --font:     'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans:     system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ──────────────────────────────────────────────────── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky; top: 0; z-index: 10;
    background: rgba(3,7,18,0.92);
    backdrop-filter: blur(8px);
  }

  .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .logo-eye {
    width: 28px; height: 28px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 8px rgba(34,211,238,0.3);
  }
  .logo-eye::after {
    content: '';
    width: 8px; height: 8px;
    background: var(--cyan);
    border-radius: 50%;
  }
  .logo h1 { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .logo .sub { font-size: 0.65rem; color: var(--dim); font-family: var(--font); }

  /* ── System stats bar ────────────────────────────────────────── */
  .sys-stats {
    display: flex; align-items: center; gap: 2px;
    flex: 1; justify-content: center;
  }
  .sys-stat {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 0.72rem; font-family: var(--font);
    color: var(--muted);
  }
  .sys-stat .label { color: var(--dim); font-size: 0.64rem; text-transform: uppercase; letter-spacing: .04em; }
  .sys-stat .value { font-weight: 600; }
  .sys-stat .value.hot  { color: var(--red); }
  .sys-stat .value.warm { color: var(--amber); }
  .sys-stat .value.cool { color: var(--green); }
  .sys-stat .value.norm { color: var(--text); }
  .stat-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

  /* ── User pill ───────────────────────────────────────────────── */
  .user-area { position: relative; flex-shrink: 0; }

  .user-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 10px 5px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    transition: background .15s, border-color .15s;
    color: var(--text);
    font-size: 0.8rem;
  }
  .user-btn:hover { background: var(--card2); border-color: var(--border2); }

  .user-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700;
    flex-shrink: 0;
  }
  .avatar-admin   { background: rgba(245,158,11,.25); color: var(--amber); }
  .avatar-user    { background: rgba(59,130,246,.25);  color: var(--blue); }
  .avatar-anon    { background: var(--card2); color: var(--dim); }
  .sign-in-text   { color: var(--dim); font-size: 0.75rem; }

  .user-dropdown {
    position: absolute; right: 0; top: calc(100% + 6px);
    min-width: 180px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    overflow: hidden;
    z-index: 100;
  }
  .user-dropdown-header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .user-dropdown-name { font-weight: 600; font-size: 0.85rem; }
  .user-dropdown-sub  { font-size: 0.72rem; color: var(--dim); margin-top: 2px; }
  .role-badge {
    display: inline-block; margin-top: 5px;
    padding: 1px 7px; border-radius: 4px;
    font-size: 0.65rem; font-weight: 700;
  }
  .role-admin { background: rgba(245,158,11,.2); color: var(--amber); }
  .role-user  { background: rgba(59,130,246,.2);  color: var(--blue); }

  .dropdown-btn {
    display: block; width: 100%;
    padding: 10px 14px;
    text-align: left; font-size: 0.8rem;
    background: none; border: none;
    cursor: pointer; color: var(--muted);
    transition: background .1s, color .1s;
  }
  .dropdown-btn:hover { background: var(--card2); color: var(--text); }
  .dropdown-btn.danger:hover { color: var(--red); }

  /* ── Login modal ─────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .modal p  { font-size: 0.78rem; color: var(--dim); margin-bottom: 20px; }
  .modal label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; }
  .modal input {
    width: 100%; background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: var(--text);
    font-size: 0.85rem; margin-bottom: 14px;
    outline: none; transition: border-color .15s;
  }
  .modal input:focus { border-color: var(--cyan); }
  .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn {
    flex: 1; padding: 9px; border-radius: 8px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none;
    transition: opacity .15s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--cyan); color: #000; }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }
  .btn-ghost   { background: var(--card2); color: var(--muted); }
  .btn-ghost:hover:not(:disabled) { background: var(--border); }
  .modal-error { color: var(--red); font-size: 0.75rem; margin-top: 8px; }

  /* ── Main ────────────────────────────────────────────────────── */
  main {
    max-width: 960px; margin: 0 auto;
    padding: 24px 16px;
    display: flex; flex-direction: column; gap: 20px;
  }

  /* ── Cards ───────────────────────────────────────────────────── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .card-header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.68rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
  }
  .card-body { padding: 16px; }

  /* ── Model grid ──────────────────────────────────────────────── */
  .model-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .model-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .2s;
  }
  .model-card.loaded   { border-color: #166534; }
  .model-card.active   { border-color: var(--amber); animation: active-glow 1.5s ease-in-out infinite; }
  .model-card.blocked  { border-color: var(--red); opacity: 0.7; }
  .model-card.missing  { opacity: 0.45; }

  @keyframes active-glow {
    0%,100% { box-shadow: 0 0 0 rgba(245,158,11,0); }
    50%      { box-shadow: 0 0 12px rgba(245,158,11,0.25); }
  }

  .model-status-row {
    display: flex; align-items: center; gap: 7px;
  }
  .model-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-missing  { background: var(--border2); }
  .dot-unloaded { background: var(--dim); }
  .dot-loaded   { background: var(--green); }
  .dot-active   { background: var(--amber); animation: pulse 1s ease-in-out infinite; }
  .dot-blocked  { background: var(--red); }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:.6} }

  .model-status-text { font-size: 0.7rem; font-weight: 600; }
  .status-missing  { color: var(--dim); }
  .status-unloaded { color: var(--dim); }
  .status-loaded   { color: var(--green); }
  .status-active   { color: var(--amber); }
  .status-blocked  { color: var(--red); }

  .model-name { font-size: 0.85rem; font-weight: 700; color: var(--text); }
  .model-char { font-size: 0.7rem; color: var(--dim); }
  .model-size { font-size: 0.65rem; color: var(--border2); font-family: var(--font); }

  .model-badge {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 0.6rem; font-weight: 700; letter-spacing: .04em;
  }
  .badge-tts { background: rgba(245,158,11,.15); color: var(--amber); }
  .badge-stt { background: rgba(59,130,246,.15);  color: var(--blue); }

  .model-btns { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .model-btn {
    flex: 1; min-width: 60px; padding: 5px 0;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--card); cursor: pointer;
    font-size: 0.7rem; font-weight: 600; color: var(--muted);
    transition: background .12s, color .12s, border-color .12s;
  }
  .model-btn:hover  { background: var(--card2); color: var(--text); }
  .model-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .model-btn.load-btn:hover:not(:disabled)      { border-color: var(--green); color: var(--green); }
  .model-btn.unload-btn:hover:not(:disabled)    { border-color: var(--red); color: var(--red); }
  .model-btn.interrupt-btn:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }

  /* ── Current state ───────────────────────────────────────────── */
  .state-row {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
  }
  .state-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .state-dot.idle  { background: var(--border2); }
  .state-dot.stt   { background: var(--blue);  animation: pulse 1s ease-in-out infinite; }
  .state-dot.tts   { background: var(--amber); animation: pulse 1s ease-in-out infinite; }
  .state-label { font-weight: 600; font-size: 0.9rem; }
  .state-label.idle { color: var(--muted); }
  .state-label.stt  { color: var(--blue); }
  .state-label.tts  { color: var(--amber); }
  .state-preview { color: var(--dim); font-size: 0.8rem; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Refresh badge ───────────────────────────────────────────── */
  .refresh-badge {
    font-size: 0.68rem; font-family: var(--font);
    color: var(--dim); display: flex; align-items: center; gap: 5px;
  }
  .refresh-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── Log ─────────────────────────────────────────────────────── */
  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-entry { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .log-entry.error-entry { border-color: var(--red); }
  .log-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; cursor: pointer; user-select: none;
    transition: background .15s;
  }
  .log-header:hover { background: var(--card2); }
  .log-chevron  { color: var(--dim); font-size: 0.7rem; width: 12px; flex-shrink: 0; }
  .log-type-badge {
    font-size: 0.62rem; font-weight: 700; font-family: var(--font);
    padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
  }
  .badge-tts-log { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-stt-log { background: rgba(59,130,246,0.15);  color: var(--blue); }
  .badge-err     { background: rgba(239,68,68,0.15);   color: var(--red); }
  .log-ts   { font-size: 0.7rem; font-family: var(--font); color: var(--dim); flex-shrink: 0; }
  .log-text { font-size: 0.8rem; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-dur  { font-size: 0.7rem; font-family: var(--font); color: var(--dim); flex-shrink: 0; }
  .log-detail { border-top: 1px solid var(--border); background: var(--bg); padding: 14px; display: none; }
  .log-detail.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 8px 16px; margin-bottom: 12px; }
  .detail-item { font-size: 0.76rem; }
  .detail-key  { color: var(--dim); }
  .detail-val  { color: var(--text); font-family: var(--font); }
  .detail-val.good { color: var(--green); }
  .detail-val.warn { color: var(--amber); }
  .detail-val.bad  { color: var(--red); }
  .detail-text {
    margin-top: 10px; padding: 10px 12px;
    background: var(--card2); border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.8rem; color: var(--text); white-space: pre-wrap; word-break: break-word;
    max-height: 200px; overflow-y: auto; line-height: 1.5;
  }
  .viseme-timeline { display: flex; gap: 2px; height: 20px; overflow-x: auto; margin-top: 10px; padding-bottom: 4px; }
  .vis-block { border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; color: rgba(0,0,0,0.7); cursor: default; }
  .rtf-bar { margin-top: 8px; height: 4px; border-radius: 2px; background: var(--card2); overflow: hidden; }
  .rtf-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .empty-log { color: var(--dim); font-size: 0.85rem; padding: 8px 0; }

  /* ── Tuning sliders ─────────────────────────────────────────── */
  .tune-slider-row { display: flex; flex-direction: column; gap: 6px; }
  .tune-label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 0.72rem; color: var(--muted);
  }
  .tune-label span { font-family: var(--font); font-size: 0.78rem; color: var(--amber2); font-weight: 700; }
  .tune-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--border); outline: none; cursor: pointer;
  }
  .tune-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--amber2);
    border: 2px solid var(--bg); cursor: pointer;
    box-shadow: 0 0 4px rgba(245,158,11,.4);
  }
  .tune-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--amber2); border: 2px solid var(--bg); cursor: pointer;
  }

  /* ── Scrollbar ───────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--card); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Login modal ─────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h2>Sign in</h2>
    <p>Identify yourself — VoiceService is an internal service, but knowing who's watching helps.</p>
    <label>Username</label>
    <input id="loginUser" type="text" placeholder="username" autocomplete="username" />
    <label>Password</label>
    <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeLoginModal()">Cancel</button>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
    </div>
    <div class="modal-error" id="loginError"></div>
  </div>
</div>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-eye"></div>
    <div>
      <h1>VoiceService</h1>
      <div class="sub">STT · TTS · :13372</div>
    </div>
  </div>

  <!-- System stats -->
  <div class="sys-stats" id="sysStats">
    <div class="sys-stat"><span class="label">CPU</span><span class="value norm" id="statCpu">—</span></div>
    <div class="stat-sep"></div>
    <div class="sys-stat"><span class="label">RAM</span><span class="value norm" id="statRam">—</span></div>
    <div class="stat-sep"></div>
    <div class="sys-stat"><span class="label">Temp</span><span class="value norm" id="statTemp">—</span></div>
    <div class="stat-sep"></div>
    <div class="refresh-badge"><div class="refresh-dot" id="refreshDot"></div><span id="refreshTs">—</span></div>
  </div>

  <!-- User pill -->
  <div class="user-area" id="userArea">
    <button class="user-btn" id="userBtn" onclick="toggleUserDropdown()">
      <div class="user-avatar avatar-anon" id="userAvatar">?</div>
      <span id="userLabel" class="sign-in-text">Sign in</span>
    </button>
    <div class="user-dropdown" id="userDropdown" style="display:none">
      <div class="user-dropdown-header" id="dropdownHeader">
        <div class="user-dropdown-name" id="dropdownName">—</div>
        <div class="user-dropdown-sub"  id="dropdownSub">—</div>
        <span class="role-badge" id="dropdownRole"></span>
      </div>
      <button class="dropdown-btn danger" onclick="signOut()">Sign out</button>
    </div>
  </div>
</header>

<main>

  <!-- Models -->
  <div class="card">
    <div class="card-header">
      <span>Models</span>
      <span id="modelsSubtitle" style="font-size:.68rem;color:var(--dim)"></span>
    </div>
    <div class="card-body">
      <div class="model-grid" id="modelGrid">
        <div style="color:var(--dim);font-size:.8rem">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Voice tuning -->
  <div class="card" id="tuningCard" style="display:none">
    <div class="card-header" style="justify-content:space-between">
      <span>Voice Tuning</span>
      <span id="tuningVoiceName" style="font-weight:700;color:var(--text);font-size:.8rem"></span>
    </div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" id="tuningSliders">
        <!-- populated by JS -->
      </div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <input id="testPhrase" type="text" placeholder="Test phrase…" style="flex:1;min-width:160px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:.82rem;outline:none"/>
        <button class="model-btn" id="testBtn" onclick="doTest()" style="flex:none;padding:7px 16px;min-width:0">▶ Test</button>
        <button class="model-btn load-btn" onclick="saveTuning()" style="flex:none;padding:7px 16px;min-width:0">Save</button>
        <button class="model-btn" onclick="resetTuning()" style="flex:none;padding:7px 16px;min-width:0;border-color:var(--border2)" title="Reset to built-in defaults">Reset</button>
        <button class="model-btn" onclick="closeTuning()" style="flex:none;padding:7px 12px;min-width:0;color:var(--dim)">✕</button>
      </div>
      <div id="tuningStatus" style="font-size:.72rem;color:var(--dim);margin-top:6px;min-height:16px"></div>
    </div>
  </div>

  <!-- Current activity -->
  <div class="card">
    <div class="card-header">Current Activity</div>
    <div class="state-row" id="stateRow">
      <div class="state-dot idle" id="stateDot"></div>
      <span class="state-label idle" id="stateLabel">Idle</span>
      <span class="state-preview" id="statePreview"></span>
    </div>
  </div>

  <!-- Operation log -->
  <div class="card">
    <div class="card-header" style="justify-content:space-between">
      <span>Operation Log</span>
      <span id="logCount" style="font-size:.68rem;color:var(--dim)"></span>
    </div>
    <div class="card-body">
      <div class="log-list" id="logList">
        <div class="empty-log">No operations yet.</div>
      </div>
    </div>
  </div>

</main>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const USER_MANAGER = `https://${location.hostname}:13376`
const JWT_KEY = 'voiceservice_jwt'

// ── User auth (client-side only — VoiceService has no backend auth) ───────────
let currentUser = null

function jwtPayload(token) {
  try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))) }
  catch { return null }
}

async function validateJwt(token) {
  try {
    const r = await fetch(`${USER_MANAGER}/auth/validate`, {
      headers: { Authorization: `Bearer ${token}` }
    })
    return r.ok ? await r.json() : null
  } catch { return null }
}

async function tryAutoLogin() {
  const token = localStorage.getItem(JWT_KEY)
  if (!token) return
  const data = await validateJwt(token)
  if (data) setUser(data.user || jwtPayload(token))
  else localStorage.removeItem(JWT_KEY)
}

function setUser(user) {
  currentUser = user
  const label = user.display_name || user.username || user.sub
  const initial = (label?.[0] || '?').toUpperCase()
  const isAdmin = user.role === 'admin'
  document.getElementById('userAvatar').textContent = initial
  document.getElementById('userAvatar').className = `user-avatar ${isAdmin ? 'avatar-admin' : 'avatar-user'}`
  document.getElementById('userLabel').textContent = label
  document.getElementById('userLabel').className = ''
  document.getElementById('dropdownName').textContent = label
  document.getElementById('dropdownSub').textContent = '@' + (user.username || user.sub || '')
  const badge = document.getElementById('dropdownRole')
  badge.textContent = user.role || 'user'
  badge.className = `role-badge ${isAdmin ? 'role-admin' : 'role-user'}`
}

function clearUser() {
  currentUser = null
  localStorage.removeItem(JWT_KEY)
  document.getElementById('userAvatar').textContent = '?'
  document.getElementById('userAvatar').className = 'user-avatar avatar-anon'
  document.getElementById('userLabel').textContent = 'Sign in'
  document.getElementById('userLabel').className = 'sign-in-text'
}

// ── Dropdown ──────────────────────────────────────────────────────────────────
let dropdownOpen = false

function toggleUserDropdown() {
  if (!currentUser) { openLoginModal(); return }
  dropdownOpen = !dropdownOpen
  document.getElementById('userDropdown').style.display = dropdownOpen ? 'block' : 'none'
}

document.addEventListener('mousedown', e => {
  if (!document.getElementById('userArea').contains(e.target)) {
    dropdownOpen = false
    document.getElementById('userDropdown').style.display = 'none'
  }
})

function signOut() {
  clearUser()
  dropdownOpen = false
  document.getElementById('userDropdown').style.display = 'none'
}

// ── Login modal ───────────────────────────────────────────────────────────────
function openLoginModal() {
  document.getElementById('loginModal').classList.add('open')
  document.getElementById('loginUser').focus()
  document.getElementById('loginError').textContent = ''
}
function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('open')
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim()
  const password = document.getElementById('loginPass').value
  const btn = document.getElementById('loginBtn')
  const err = document.getElementById('loginError')
  if (!username || !password) { err.textContent = 'Enter username and password.'; return }
  btn.disabled = true; btn.textContent = 'Signing in…'
  err.textContent = ''
  try {
    const r = await fetch(`${USER_MANAGER}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    })
    if (!r.ok) { err.textContent = 'Invalid credentials.'; return }
    const data = await r.json()
    const token = data.access_token
    localStorage.setItem(JWT_KEY, token)
    const payload = jwtPayload(token)
    setUser({ ...payload, display_name: data.user?.display_name || payload?.display_name })
    closeLoginModal()
    document.getElementById('loginPass').value = ''
  } catch {
    err.textContent = 'Could not reach UserManager.'
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In'
  }
}

// ── System stats ──────────────────────────────────────────────────────────────
async function fetchStats() {
  try {
    const d = await fetch('/stats').then(r => r.json())
    const cpu = d.cpu_percent
    const ram = d.memory_used_mb
    const temp = d.temperature_c

    const cpuEl = document.getElementById('statCpu')
    cpuEl.textContent = cpu + '%'
    cpuEl.className = `value ${cpu > 80 ? 'hot' : cpu > 50 ? 'warm' : 'norm'}`

    const ramEl = document.getElementById('statRam')
    ramEl.textContent = ram >= 1024 ? (ram/1024).toFixed(1) + ' GB' : ram + ' MB'
    ramEl.className = `value ${d.memory_percent > 85 ? 'hot' : d.memory_percent > 60 ? 'warm' : 'norm'}`

    const tempEl = document.getElementById('statTemp')
    if (temp !== null && temp !== undefined) {
      tempEl.textContent = temp + '°C'
      tempEl.className = `value ${temp > 80 ? 'hot' : temp > 60 ? 'warm' : 'cool'}`
    } else {
      tempEl.textContent = '—'
      tempEl.className = 'value norm'
    }
  } catch {}
}

// ── Model management ──────────────────────────────────────────────────────────
async function fetchModels() {
  try {
    const d = await fetch('/models').then(r => r.json())
    renderModels(d.models || [])
  } catch {}
}

async function modelAction(voice_id, action) {
  const btn = document.querySelector(`[data-model="${voice_id}"] .${action}-btn`)
  if (btn) { btn.disabled = true; btn.textContent = '…' }
  try {
    await fetch(`/models/${voice_id}/${action}`, { method: 'POST' })
    await fetchModels()
  } catch {
    if (btn) { btn.disabled = false }
  }
}

function renderModels(models) {
  const grid = document.getElementById('modelGrid')
  grid.innerHTML = ''

  const loaded  = models.filter(m => m.loaded).length
  const active  = models.filter(m => m.active).length
  const total   = models.length
  document.getElementById('modelsSubtitle').textContent =
    `${loaded}/${total} loaded${active ? ' · 1 active' : ''}`

  models.forEach(m => {
    const card = document.createElement('div')
    let stateClass = 'missing'
    let dotClass   = 'dot-missing'
    let statusText = 'Not installed'
    let statusCls  = 'status-missing'
    if (m.blocked)  { stateClass='blocked'; dotClass='dot-blocked';  statusText='Blocked';   statusCls='status-blocked'; }
    else if (m.active)   { stateClass='active';  dotClass='dot-active';   statusText='Active';    statusCls='status-active'; }
    else if (m.loaded)   { stateClass='loaded';  dotClass='dot-loaded';   statusText='Loaded';    statusCls='status-loaded'; }
    else if (m.file_exists) { stateClass='';     dotClass='dot-unloaded'; statusText='Not loaded'; statusCls='status-unloaded'; }
    card.className = `model-card ${stateClass}`
    card.dataset.model = m.id

    const sizeStr = m.file_size_mb ? `${m.file_size_mb} MB` : ''

    // Buttons
    let btns = ''
    if (m.id !== 'stt') {
      if (!m.file_exists) {
        btns = `<button class="model-btn" disabled title="Model file not found on disk">No file</button>`
      } else {
        if (m.active) {
          btns += `<button class="model-btn interrupt-btn" data-action="interrupt" title="Mark for interruption — next synthesis returns 503">Stop</button>`
        }
        if (m.loaded) {
          btns += `<button class="model-btn unload-btn" data-action="unload">Unload</button>`
        } else {
          btns += `<button class="model-btn load-btn" data-action="load">Load</button>`
        }
        btns += `<button class="model-btn" data-tune="${m.id}" data-name="${escHtml(m.name)}" title="Tune speed and voice parameters">⚙ Tune</button>`
      }
    } else {
      if (m.loaded) {
        btns = `<button class="model-btn unload-btn" data-action="unload">Unload</button>`
      } else {
        btns = `<button class="model-btn load-btn" data-action="load">Load</button>`
      }
    }

    const speedBadge = m.speed != null
      ? `<span style="font-size:.62rem;font-family:var(--font);color:var(--amber);opacity:.7">×${m.speed.toFixed(2)}</span>`
      : ''

    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
        <div>
          <div class="model-name">${escHtml(m.name)}</div>
          <div class="model-char">${escHtml(m.character)}</div>
        </div>
        <span class="model-badge ${m.type === 'tts' ? 'badge-tts' : 'badge-stt'}">${m.type.toUpperCase()}</span>
      </div>
      <div class="model-status-row">
        <div class="model-dot ${dotClass}"></div>
        <span class="model-status-text ${statusCls}">${statusText}</span>
        ${sizeStr ? `<span class="model-size">${sizeStr}</span>` : ''}
        ${speedBadge}
      </div>
      ${btns ? `<div class="model-btns">${btns}</div>` : ''}
    `

    // Wire button clicks
    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => modelAction(m.id, btn.dataset.action))
    })
    card.querySelectorAll('[data-tune]').forEach(btn => {
      btn.addEventListener('click', () => openTuning(btn.dataset.tune, btn.dataset.name))
    })

    grid.appendChild(card)
  })
}

// ── Viseme helpers ────────────────────────────────────────────────────────────
const VNAME = ['sil','AA','AE','AH','AO','AW','AY','EH','ER','IH','IY','OW','OY','UH','UW','B/P','F/V','TH','D/T','K/G','CH','S/Z','L/R','W/Y']
const VCOL  = id => {
  if (id === 0)            return '#374151'
  if (id >= 1 && id <= 14) return '#f59e0b'
  if (id === 15)            return '#3b82f6'
  if (id === 16)            return '#8b5cf6'
  return '#22d3ee'
}

function buildVisemeBar(visemes) {
  if (!visemes || !visemes.length) return null
  const div = document.createElement('div')
  div.className = 'viseme-timeline'
  visemes.forEach((v, i) => {
    const next = visemes[i + 1]
    const dur  = next ? next.offset_ms - v.offset_ms : 80
    const w    = Math.max(5, Math.min(30, dur / 6))
    const el = document.createElement('div')
    el.className = 'vis-block'
    el.style.width      = w + 'px'
    el.style.background = VCOL(v.viseme_id)
    el.title = `${VNAME[v.viseme_id] ?? v.viseme_id} @ ${v.offset_ms}ms`
    if (w >= 14) el.textContent = VNAME[v.viseme_id] ?? v.viseme_id
    div.appendChild(el)
  })
  return div
}

// ── Time formatting ───────────────────────────────────────────────────────────
function fmtTs(unix)   { if (!unix) return '—'; return new Date(unix * 1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}) }
function fmtDate(unix) { if (!unix) return '—'; return new Date(unix * 1000).toLocaleString() }
function fmsDur(ms)    { if (ms == null) return '—'; return ms >= 1000 ? (ms/1000).toFixed(2)+' s' : ms+' ms' }
function rtfColor(rtf) { if (rtf == null) return ''; if (rtf < 0.5) return 'good'; if (rtf < 1.0) return 'warn'; return 'bad' }

// ── Log entry renderer ────────────────────────────────────────────────────────
function renderEntry(e) {
  const isTts  = e.type === 'tts'
  const hasErr = !!e.error
  const wrap = document.createElement('div')
  wrap.className = 'log-entry' + (hasErr ? ' error-entry' : '')

  const hdr = document.createElement('div')
  hdr.className = 'log-header'
  const preview = isTts ? (e.text || '').substring(0, 80)
                        : (e.transcript ? `"${e.transcript.substring(0, 80)}"` : '(no transcript)')
  hdr.innerHTML = `
    <span class="log-chevron">▶</span>
    <span class="log-type-badge ${isTts ? 'badge-tts-log' : 'badge-stt-log'}">${isTts ? 'TTS' : 'STT'}</span>
    ${hasErr ? '<span class="log-type-badge badge-err">ERR</span>' : ''}
    ${e.voice ? `<span style="font-size:.65rem;font-family:var(--font);color:var(--dim);padding:1px 5px;background:var(--card2);border-radius:3px">${escHtml(e.voice)}</span>` : ''}
    <span class="log-ts">${fmtTs(e.started_at)}</span>
    <span class="log-text">${escHtml(preview)}</span>
    <span class="log-dur">${fmsDur(e.duration_ms)}</span>
  `

  const det = document.createElement('div')
  det.className = 'log-detail'

  const gridItems = [
    { k:'Started',    v: fmtDate(e.started_at) },
    { k:'Finished',   v: fmtDate(e.finished_at) },
    { k:'Processing', v: fmsDur(e.duration_ms) },
  ]
  if (isTts) {
    gridItems.push(
      { k:'Voice',     v: e.voice || '—' },
      { k:'Audio',     v: fmsDur(e.audio_ms) },
      { k:'Synthesis', v: fmsDur(e.synthesis_ms) },
      { k:'RTF',       v: e.rtf != null ? e.rtf.toFixed(3) : '—', cls: 'detail-val ' + rtfColor(e.rtf) },
      { k:'Visemes',   v: e.viseme_count != null ? e.viseme_count : '—' },
    )
    if (e.speed      != null) gridItems.push({ k:'Speed',       v: e.speed })
    if (e.noise_scale!= null) gridItems.push({ k:'Noise scale', v: e.noise_scale })
    if (e.noise_w    != null) gridItems.push({ k:'Noise W',     v: e.noise_w })
  } else {
    gridItems.push(
      { k:'Transcript words', v: e.transcript_words != null ? e.transcript_words : '—' },
      { k:'Input audio',      v: e.audio_bytes != null ? (e.audio_bytes/1024).toFixed(1)+' KB' : '—' },
    )
  }

  const gridHtml = gridItems.map(it =>
    `<div class="detail-item"><div class="detail-key">${it.k}</div><div class="${it.cls||'detail-val'}">${escHtml(String(it.v))}</div></div>`
  ).join('')

  let rtfBar = ''
  if (isTts && e.rtf != null) {
    const pct   = Math.min(100, e.rtf * 100)
    const color = e.rtf < 0.5 ? '#22c55e' : e.rtf < 1.0 ? '#f59e0b' : '#ef4444'
    rtfBar = `<div style="font-size:.68rem;color:var(--dim);margin-top:10px">RTF: <span style="color:${color};font-family:var(--font)">${e.rtf.toFixed(3)}×</span></div>
              <div class="rtf-bar"><div class="rtf-fill" style="width:${pct}%;background:${color}"></div></div>`
  }

  det.innerHTML = `<div class="detail-grid">${gridHtml}</div>${rtfBar}`

  const fullText = isTts ? e.text : e.transcript
  if (fullText) {
    const pre = document.createElement('div')
    pre.className = 'detail-text'
    pre.textContent = fullText
    det.appendChild(pre)
  }

  if (isTts && e.visemes && e.visemes.length) {
    const lbl = document.createElement('div')
    lbl.style.cssText = 'font-size:.68rem;color:var(--dim);margin-top:10px;margin-bottom:4px'
    lbl.textContent = `Viseme timeline (${e.visemes.length} events)`
    det.appendChild(lbl)
    const bar = buildVisemeBar(e.visemes)
    if (bar) det.appendChild(bar)
  }

  if (e.error) {
    const errDiv = document.createElement('div')
    errDiv.style.cssText = 'margin-top:10px;padding:8px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:6px;color:var(--red);font-size:.78rem;font-family:var(--font);white-space:pre-wrap'
    errDiv.textContent = e.error
    det.appendChild(errDiv)
  }

  hdr.addEventListener('click', () => {
    const open = det.classList.toggle('open')
    hdr.querySelector('.log-chevron').textContent = open ? '▼' : '▶'
  })

  wrap.appendChild(hdr)
  wrap.appendChild(det)
  return wrap
}

// ── Activity poll ─────────────────────────────────────────────────────────────
let knownIds = new Set()

async function poll() {
  try {
    const d = await fetch('/activity').then(r => r.json())

    // Refresh flash
    const dot = document.getElementById('refreshDot')
    dot.style.background = '#f59e0b'
    setTimeout(() => dot.style.background = '#22c55e', 300)
    document.getElementById('refreshTs').textContent =
      new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})

    // State row
    const s = d.state || 'idle'
    document.getElementById('stateDot').className   = `state-dot ${s}`
    document.getElementById('stateLabel').className = `state-label ${s}`
    const labels = { idle:'Idle', stt:'Transcribing audio…', tts:'Synthesising speech…' }
    document.getElementById('stateLabel').textContent = labels[s] || s
    const prev = document.getElementById('statePreview')
    if (s !== 'idle' && d.preview) {
      prev.textContent = `"${d.preview}"` + (d.voice ? ` · ${d.voice}` : '')
    } else {
      prev.textContent = ''
    }

    // Log
    const log = d.log || []
    document.getElementById('logCount').textContent = log.length ? `${log.length} entries` : ''
    const list = document.getElementById('logList')
    if (!log.length) {
      list.innerHTML = '<div class="empty-log">No operations yet — send a TTS or STT request.</div>'
      knownIds = new Set()
      return
    }
    const newEntries = log.filter(e => !knownIds.has(e.id))
    newEntries.forEach(e => {
      knownIds.add(e.id)
      const node = renderEntry(e)
      if (list.firstChild?.classList?.contains('empty-log')) list.innerHTML = ''
      list.insertBefore(node, list.firstChild)
    })
    while (list.children.length > 100) list.removeChild(list.lastChild)
  } catch {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Voice Tuning ─────────────────────────────────────────────────────────────
let tuningVoiceId   = null
let tuningDefaults  = {}
let audioCtx        = null

function openTuning(voiceId, voiceName) {
  tuningVoiceId = voiceId
  document.getElementById('tuningCard').style.display = 'block'
  document.getElementById('tuningVoiceName').textContent = voiceName
  document.getElementById('testPhrase').value = defaultTestPhrase(voiceId)
  document.getElementById('tuningStatus').textContent = 'Loading settings…'
  loadTuningSettings(voiceId)
  document.getElementById('tuningCard').scrollIntoView({ behavior: 'smooth', block: 'start' })
}

function closeTuning() {
  tuningVoiceId = null
  document.getElementById('tuningCard').style.display = 'none'
}

function defaultTestPhrase(voiceId) {
  const phrases = {
    glados:   'Good morning. You are, in fact, still here. I find that mildly irritating.',
    hal:      'I am completely operational, and all my circuits are functioning perfectly.',
    k9:       'Affirmative, Master. All systems nominal. Standing by for instructions.',
    k9v2:     'Affirmative, Master. All systems nominal. Standing by for instructions.',
    jarvis:   'All systems are fully operational, sir. Shall I begin the pre-flight checks?',
    wheatley: 'Hello! Are you there? I have been thinking about a plan, and I think it is going brilliantly.',
    data:     'I have processed the available data. My analysis indicates a ninety-seven percent probability of success.',
  }
  return phrases[voiceId] || 'Hello, this is a voice test.'
}

async function loadTuningSettings(voiceId) {
  try {
    const d = await fetch(`/voices/${voiceId}/settings`).then(r => r.json())
    tuningDefaults = d.defaults || {}
    buildTuningSliders(voiceId, d)
    document.getElementById('tuningStatus').textContent = ''
  } catch {
    document.getElementById('tuningStatus').textContent = 'Failed to load settings.'
  }
}

function buildTuningSliders(voiceId, settings) {
  const container = document.getElementById('tuningSliders')
  container.innerHTML = ''

  const addSlider = (key, label, value, min, max, step) => {
    const id = `tune-${key}`
    const row = document.createElement('div')
    row.className = 'tune-slider-row'
    row.innerHTML = `
      <div class="tune-label">${label} <span id="${id}-val">${Number(value).toFixed(step < 0.1 ? 3 : 2)}</span></div>
      <input type="range" class="tune-slider" id="${id}" min="${min}" max="${max}" step="${step}" value="${value}" />
    `
    row.querySelector('input').addEventListener('input', e => {
      document.getElementById(`${id}-val`).textContent = Number(e.target.value).toFixed(step < 0.1 ? 3 : 2)
    })
    container.appendChild(row)
  }

  addSlider('speed', 'Speed', settings.speed ?? 1.0, 0.1, 2.0, 0.01)

  if (voiceId === 'glados') {
    addSlider('noise_scale', 'Noise Scale (expressiveness)', settings.noise_scale ?? 0.333, 0.0, 1.0, 0.001)
    addSlider('noise_w',     'Noise W (duration variation)',  settings.noise_w     ?? 0.333, 0.0, 1.0, 0.001)
  }
}

function getTuningValues() {
  const speed = parseFloat(document.getElementById('tune-speed')?.value ?? 1.0)
  const vals = { speed }
  if (tuningVoiceId === 'glados') {
    vals.noise_scale = parseFloat(document.getElementById('tune-noise_scale')?.value ?? 0.333)
    vals.noise_w     = parseFloat(document.getElementById('tune-noise_w')?.value ?? 0.333)
  }
  return vals
}

async function saveTuning() {
  if (!tuningVoiceId) return
  const vals = getTuningValues()
  const status = document.getElementById('tuningStatus')
  status.textContent = 'Saving…'
  try {
    await fetch(`/voices/${tuningVoiceId}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(vals),
    })
    status.textContent = '✓ Saved — new requests will use these settings.'
    setTimeout(() => { status.textContent = '' }, 3000)
  } catch {
    status.textContent = '✗ Save failed.'
  }
}

async function resetTuning() {
  if (!tuningVoiceId) return
  const d = tuningDefaults
  if (!d || !d.speed) return
  // Rebuild sliders with defaults
  buildTuningSliders(tuningVoiceId, d)
  document.getElementById('tuningStatus').textContent = 'Reset to defaults — click Save to persist.'
}

async function doTest() {
  if (!tuningVoiceId) return
  const phrase = document.getElementById('testPhrase').value.trim() || defaultTestPhrase(tuningVoiceId)
  const vals   = getTuningValues()
  const btn    = document.getElementById('testBtn')
  const status = document.getElementById('tuningStatus')
  btn.disabled = true; btn.textContent = '⏳ Synthesising…'
  status.textContent = ''
  try {
    const payload = { text: phrase, voice: tuningVoiceId, ...vals }
    const resp = await fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    if (!resp.ok) { status.textContent = `✗ TTS error: ${resp.status}`; return }
    const data = await resp.json()
    // Decode and play WAV
    if (!audioCtx) audioCtx = new AudioContext()
    if (audioCtx.state === 'suspended') await audioCtx.resume()
    const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0))
    const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer)
    const source = audioCtx.createBufferSource()
    source.buffer = audioBuffer
    source.connect(audioCtx.destination)
    source.start()
    status.textContent = `▶ Playing — ${data.duration_ms}ms audio, synthesis took ${data.synthesis_ms}ms`
  } catch(e) {
    status.textContent = `✗ Error: ${e.message}`
  } finally {
    btn.disabled = false; btn.textContent = '▶ Test'
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
tryAutoLogin()
fetchStats()
fetchModels()
poll()

setInterval(poll,        2000)
setInterval(fetchModels, 5000)
setInterval(fetchStats,  5000)
</script>
